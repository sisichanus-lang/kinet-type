<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINET – Live Interactive Typeface</title>
<style>
  @font-face {
    font-family: 'KMR-Waldenburg';
    src: url('https://files.manuscdn.com/user_upload_by_module/session_file/310519663434013054/MagzihzLkNuNHSAu.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    font-family: 'KMR-Waldenburg', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
  }
  #sketch-container {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
    aspect-ratio: 16 / 9;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* ── Control Panel ── */
  #controls {
    position: absolute;
    top: 0;
    left: 0;
    width: 160px;
    padding: 10px 12px 14px;
    background: rgba(245,245,245,0.95);
    border-right: 1px solid #ccc;
    font-size: 11px;
    color: #000;
    z-index: 10;
    user-select: none;
    overflow-y: auto;
    max-height: 100vh;
    font-family: 'KMR-Waldenburg', monospace;
  }
  #controls.hidden { display: none; }

  .ctrl-row { margin-bottom: 10px; }
  .ctrl-label {
    display: block;
    font-size: 10px;
    margin-bottom: 3px;
    color: #0000ff;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-family: 'KMR-Waldenburg', monospace;
  }
  .ctrl-label.green { color: #00cc00; }
  .ctrl-label.red { color: #ff0000; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 8px;
    background: #000;
    outline: none;
    cursor: pointer;
    border: 1px solid #000;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: #fff;
    border: 1px solid #000;
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: #fff;
    border: 1px solid #000;
    cursor: pointer;
    border-radius: 0;
  }
  input[type=range].green-track { background: #000; }
  input[type=range].green-track::-webkit-slider-thumb { background: #00ff00; }
  input[type=range].green-track::-moz-range-thumb { background: #00ff00; }

  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  button {
    flex: 1;
    min-width: 40px;
    padding: 5px 4px;
    font-size: 9px;
    font-family: 'KMR-Waldenburg', monospace;
    cursor: pointer;
    border: 1.5px solid #000;
    background: #fff;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: background 0.15s;
  }
  button:hover { background: #ff00ff22; }
  button.active { background: #ff00ff; color: #fff; }
  button.yellow-btn:hover { background: #ff00ff22; }

  select {
    width: 100%;
    padding: 4px 6px;
    font-size: 10px;
    font-family: 'KMR-Waldenburg', monospace;
    border: 1.5px solid #000;
    background: #000;
    color: #fff;
    cursor: pointer;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  select option { background: #111; color: #fff; }

  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .color-swatch {
    width: 24px;
    height: 24px;
    border: 1.5px solid #000;
    cursor: pointer;
    flex-shrink: 0;
  }
  .color-label {
    font-size: 9px;
    color: #0000ff;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-family: 'KMR-Waldenburg', monospace;
  }
  input[type=color] {
    width: 0; height: 0; opacity: 0; position: absolute;
  }

  /* Top bar buttons (always visible) */
  #topbar {
    position: absolute;
    top: 8px;
    left: 8px;
    display: flex;
    gap: 6px;
    z-index: 20;
  }
  #topbar button {
    padding: 5px 10px;
    font-size: 10px;
    min-width: unset;
    flex: unset;
  }

  /* Mic indicator */
  #mic-indicator {
    position: absolute;
    bottom: 12px;
    left: 12px;
    font-size: 10px;
    color: #aaa;
    z-index: 10;
    pointer-events: none;
    font-family: 'KMR-Waldenburg', monospace;
  }
  #mic-indicator.active { color: #00cc00; }

  /* Keyboard hint */
  #hint {
    position: absolute;
    bottom: 12px;
    right: 12px;
    font-size: 10px;
    color: #aaa;
    z-index: 10;
    pointer-events: none;
    font-family: 'KMR-Waldenburg', monospace;
  }
</style>
</head>
<body>
<div id="sketch-container">
  <canvas id="c"></canvas>

  <!-- Always-visible top bar -->
  <div id="topbar">
    <button id="btn-toggle" onclick="toggleControls()">Hide</button>
    <button onclick="exportCanvas()">Export</button>
  </div>

  <!-- Side control panel -->
  <div id="controls">
    <!-- Spacer for topbar -->
    <div style="height:36px"></div>

    <!-- Weight -->
    <div class="ctrl-row">
      <label class="ctrl-label" for="sl-weight">Stroke W</label>
      <input type="range" id="sl-weight" min="5" max="35" value="35" step="1">
    </div>
    <!-- Stroke Weight -->
    <div class="ctrl-row">
      <label class="ctrl-label" for="sl-stroke-w">Weight</label>
      <input type="range" id="sl-stroke-w" min="0" max="20" value="20" step="1">
    </div>
    <!-- Size -->
    <div class="ctrl-row">
      <label class="ctrl-label" for="sl-size">Size</label>
      <input type="range" id="sl-size" min="0.1" max="2.4" value="2.4" step="0.01">
    </div>
    <!-- Leading -->
    <div class="ctrl-row">
      <label class="ctrl-label" for="sl-leading">Leading</label>
      <input type="range" id="sl-leading" min="-120" max="84" value="40" step="1">
    </div>
    <!-- Tracking -->
    <div class="ctrl-row">
      <label class="ctrl-label" for="sl-tracking">Tracking</label>
      <input type="range" id="sl-tracking" min="-50" max="100" value="0" step="1">
    </div>

    <hr style="border:none;border-top:1px solid #ccc;margin:8px 0">

    <!-- Colors -->
    <div class="color-row">
      <div class="color-swatch" id="type-swatch" style="background:#0000ff" onclick="document.getElementById('type-picker').click()"></div>
      <span class="color-label">Stroke</span>
      <input type="color" id="type-picker" value="#0000ff" oninput="onTypeChange(this.value)">
    </div>

    <div class="color-row">
      <div class="color-swatch" id="stroke-swatch" style="background:#ff0000" onclick="document.getElementById('stroke-picker').click()"></div>
      <span class="color-label">Type</span>
      <input type="color" id="stroke-picker" value="#ff0000" oninput="onStrokeChange(this.value)">
    </div>

    <div class="color-row">
      <div class="color-swatch" id="bg-swatch" style="background:#f5f5f5" onclick="document.getElementById('bg-picker').click()"></div>
      <span class="color-label">BG</span>
      <input type="color" id="bg-picker" value="#f5f5f5" oninput="onBgChange(this.value)">
    </div>

    <hr style="border:none;border-top:1px solid #ccc;margin:8px 0">

    <!-- PLAY sliders -->
    <div class="ctrl-row">
      <label class="ctrl-label green" for="sl-p1">PLAY_1</label>
      <input type="range" id="sl-p1" class="green-track" min="0" max="55" value="0" step="1">
    </div>
    <div class="ctrl-row">
      <label class="ctrl-label green" for="sl-p2">PLAY_2</label>
      <input type="range" id="sl-p2" class="green-track" min="0" max="40" value="0" step="1">
    </div>
    <div class="ctrl-row">
      <label class="ctrl-label green" for="sl-p3">PLAY_3</label>
      <input type="range" id="sl-p3" class="green-track" min="0" max="40" value="0" step="1">
    </div>
    <div class="ctrl-row">
      <label class="ctrl-label green" for="sl-p4">PLAY_4</label>
      <input type="range" id="sl-p4" class="green-track" min="0" max="40" value="0" step="1">
    </div>

    <hr style="border:none;border-top:1px solid #ccc;margin:8px 0">

    <!-- Sound -->
    <div class="btn-row">
      <button onclick="uploadSound()">Upload Sound</button>
    </div>
    <div class="btn-row">
      <button onclick="playSound()">Play</button>
      <button onclick="pauseSound()">Pause</button>
    </div>

    <!-- Mic -->
    <div class="btn-row">
      <button id="btn-mic" onclick="toggleMic()">Use Mic</button>
    </div>

    <!-- Control Option -->
    <div class="ctrl-row">
      <label class="ctrl-label red">Control Option</label>
      <select id="sel-control">
        <option value="PLAY_1">PLAY_1</option>
        <option value="PLAY_2">PLAY_2</option>
        <option value="PLAY_3">PLAY_3</option>
        <option value="PLAY_4">PLAY_4</option>
        <option value="PLAY_1+PLAY_2">PLAY_1+PLAY_2</option>
        <option value="PLAY_1+PLAY_3">PLAY_1+PLAY_3</option>
        <option value="PLAY_1+PLAY_4">PLAY_1+PLAY_4</option>
        <option value="PLAY_2+PLAY_3">PLAY_2+PLAY_3</option>
        <option value="PLAY_2+PLAY_4">PLAY_2+PLAY_4</option>
        <option value="PLAY_3+PLAY_4">PLAY_3+PLAY_4</option>
        <option value="PLAY_1+PLAY_2+PLAY_3">PLAY_1+PLAY_2+PLAY_3</option>
        <option value="PLAY_1+PLAY_2+PLAY_4">PLAY_1+PLAY_2+PLAY_4</option>
        <option value="PLAY_2+PLAY_3+PLAY_4">PLAY_2+PLAY_3+PLAY_4</option>
      </select>
    </div>

    <!-- Clear -->
    <div class="btn-row">
      <button class="yellow-btn" onclick="resetEverything()">Clear</button>
    </div>
  </div>

  <div id="mic-indicator">● MIC OFF</div>
  <div id="hint">Type to add letters · Backspace to delete</div>
</div>

<!-- Hidden file input for audio -->
<input type="file" id="file-input" accept="audio/*" style="display:none" onchange="fileSelected(this)">

<script>
// ─────────────────────────────────────────────
//  KINET – Optimized Interactive Typeface
// ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d', { alpha: false });

// ── State ───────────────────────────────
let strokeW  = 35;
let strokeWeight = 20;
let unitSize = 2.4;
let leading  = 40;
let tracking = 0;
let PLAY_1   = 0, PLAY_2 = 0, PLAY_3 = 0, PLAY_4 = 0;
let typeColor = '#0000ff';
let strokeColor = '#ff0000';
let bgColor = '#f5f5f5';
let currentControlOption = 'PLAY_1';
let controlsVisible = true;

const letterHeight = 300;
const controlPanelWidth = 160;

let letters = ['t', 'y', 'p', 'e'];

// ── Audio ──────────────────────────────────────
let audioCtx     = null;
let analyser     = null;
let audioBuffer  = null;
let sourceNode   = null;
let isPlaying    = false;
let micStream    = null;
let micActive    = false;
let dataArray    = null;

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.connect(audioCtx.destination);
  }
}

function getAmplitude() {
  if (!analyser || !dataArray) return 0;
  analyser.getByteTimeDomainData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const v = (dataArray[i] - 128) / 128;
    sum += v * v;
  }
  return Math.sqrt(sum / dataArray.length);
}

function uploadSound() {
  document.getElementById('file-input').click();
}

function fileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  ensureAudioCtx();
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buf => {
      audioBuffer = buf;
    });
  };
  reader.readAsArrayBuffer(file);
}

function playSound() {
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!audioBuffer) return;
  if (sourceNode) { try { sourceNode.stop(); } catch(e){} }
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.connect(analyser);
  sourceNode.loop = false;
  sourceNode.start(0);
  isPlaying = true;
  sourceNode.onended = () => { isPlaying = false; };
}

function pauseSound() {
  if (sourceNode && isPlaying) {
    try { sourceNode.stop(); } catch(e){}
    isPlaying = false;
  }
  if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
}

async function toggleMic() {
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (micActive) {
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    micActive = false;
    document.getElementById('btn-mic').textContent = 'Use Mic';
    document.getElementById('mic-indicator').textContent = '● MIC OFF';
    document.getElementById('mic-indicator').classList.remove('active');
  } else {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const micSource = audioCtx.createMediaStreamSource(micStream);
      micSource.connect(analyser);
      micActive = true;
      document.getElementById('btn-mic').textContent = 'Stop Mic';
      document.getElementById('mic-indicator').textContent = '● MIC ON';
      document.getElementById('mic-indicator').classList.add('active');
    } catch(e) {
      alert('Microphone access denied.');
    }
  }
}

// ── Slider bindings ──────────────────────────────
document.getElementById('sl-weight').addEventListener('input', e => { strokeW = +e.target.value; });
document.getElementById('sl-stroke-w').addEventListener('input', e => { strokeWeight = +e.target.value; });
document.getElementById('sl-size').addEventListener('input',   e => { unitSize = +e.target.value; });
document.getElementById('sl-leading').addEventListener('input', e => { leading = +e.target.value; });
document.getElementById('sl-tracking').addEventListener('input', e => { tracking = +e.target.value; });
document.getElementById('sl-p1').addEventListener('input', e => { PLAY_1 = +e.target.value; });
document.getElementById('sl-p2').addEventListener('input', e => { PLAY_2 = +e.target.value; });
document.getElementById('sl-p3').addEventListener('input', e => { PLAY_3 = +e.target.value; });
document.getElementById('sl-p4').addEventListener('input', e => { PLAY_4 = +e.target.value; });
document.getElementById('sel-control').addEventListener('change', e => { currentControlOption = e.target.value; });

function onTypeChange(hex) {
  typeColor = hex;
  document.getElementById('type-swatch').style.background = hex;
}

function onStrokeChange(hex) {
  strokeColor = hex;
  document.getElementById('stroke-swatch').style.background = hex;
}

function onBgChange(hex) {
  bgColor = hex;
  document.getElementById('bg-swatch').style.background = hex;
}

// ── Canvas click to clear ────────────────────
canvas.addEventListener('click', e => {
  // Check if click is on canvas area (not on control panel)
  if (e.clientX > controlPanelWidth) {
    letters = [];
  }
});

// ── Keyboard ───────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (e.key === 'Backspace') {
    if (letters.length > 0) letters.pop();
    e.preventDefault();
  } else if (e.key === 'Enter') {
    letters.push('\n');
  } else if (e.key.length === 1) {
    const ch = e.key.toLowerCase();
    letters.push(ch);
  }
});

// ── UI helpers ─────────────────────────────────
function toggleControls() {
  controlsVisible = !controlsVisible;
  document.getElementById('controls').classList.toggle('hidden', !controlsVisible);
  document.getElementById('btn-toggle').textContent = controlsVisible ? 'Hide' : 'Show';
}

function exportCanvas() {
  const link = document.createElement('a');
  link.download = 'kinet.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function resetEverything() {
  letters = ['t', 'y', 'p', 'e'];
  strokeW = 35; document.getElementById('sl-weight').value = 35;
  strokeWeight = 20; document.getElementById('sl-stroke-w').value = 20;
  unitSize = 2.4; document.getElementById('sl-size').value = 2.4;
  leading = 40; document.getElementById('sl-leading').value = 40;
  tracking = 0; document.getElementById('sl-tracking').value = 0;
  PLAY_1 = 0; document.getElementById('sl-p1').value = 0;
  PLAY_2 = 0; document.getElementById('sl-p2').value = 0;
  PLAY_3 = 0; document.getElementById('sl-p3').value = 0;
  PLAY_4 = 0; document.getElementById('sl-p4').value = 0;
  typeColor = '#0000ff';
  strokeColor = '#ff0000';
  bgColor = '#f5f5f5';
  document.getElementById('type-picker').value = '#0000ff';
  document.getElementById('type-swatch').style.background = '#0000ff';
  document.getElementById('stroke-picker').value = '#ff0000';
  document.getElementById('stroke-swatch').style.background = '#ff0000';
  document.getElementById('bg-picker').value = '#f5f5f5';
  document.getElementById('bg-swatch').style.background = '#f5f5f5';
  document.getElementById('sel-control').value = 'PLAY_1';
  currentControlOption = 'PLAY_1';
}

// ── Resize ─────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── lerp helper ────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function constrain(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ── Letter width table ─────────────────────────
const letterWidths = {
  ' ':60, a:160, b:120, c:120, d:140, e:120, f:110, g:140,
  h:120, i:120, j:120, k:120, l:120, m:240, n:140, o:120,
  p:120, q:120, r:180, s:120, t:120, u:200, v:120, w:240,
  x:120, y:120, z:120
};

function updateXPosition(currentX, c) {
  const baseTracking = 60 - PLAY_1 / 6;
  const advances = {
    a:140, b:120, c:120, d:140, e:120, f:110, g:140,
    h:120, i:120, j:120, k:120, l:80,  m:240, n:140,
    o:120, p:120, q:120, r:140, s:120, t:140, u:180,
    v:120, w:230, x:180, y:120, z:120, ' ':60
  };
  return currentX + (advances[c] || 0) + baseTracking + tracking;
}

// ── Drawing helpers ────────────────────────────
function push() { ctx.save(); }
function pop()  { ctx.restore(); }

function beginShape() { ctx.beginPath(); _shapeStarted = true; _firstVertex = true; }
let _shapeStarted = false, _firstVertex = true;

function vertex(x, y) {
  if (_firstVertex) { ctx.moveTo(x, y); _firstVertex = false; }
  else              { ctx.lineTo(x, y); }
}

function bezierVertex(cp1x, cp1y, cp2x, cp2y, x, y) {
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x, y);
}

function endShape() { ctx.stroke(); _shapeStarted = false; }

function line(x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

// ── Letter drawing functions ───────────────────
function letterA(xPos, yPos) {
  push(); ctx.translate(xPos, yPos);
  beginShape();
  vertex(0 + PLAY_1 + PLAY_2 + PLAY_3, 0 - PLAY_2 * 3);
  vertex(120 - PLAY_3 * .5, 0 - PLAY_2 * 3 - PLAY_3 * .5);
  vertex(120 - PLAY_1 - PLAY_2 / 2 - PLAY_3 * .25 - PLAY_4 * .5, 180 - PLAY_3 * .5);
  vertex(180 - PLAY_1 - PLAY_2 / 2 - PLAY_4 * .5, 180);
  endShape();
  line(0, 90, 120 + PLAY_4 * .5, 90 - PLAY_4 * .5);
  beginShape();
  vertex(0, 90); vertex(0, 150);
  bezierVertex(0, 190, 60, 190, 60, 150);
  vertex(60, 90);
  endShape();
  pop();
}

function letterB(xPos, yPos) {
  push(); ctx.translate(xPos, yPos); ctx.translate(-60, -90);
  beginShape();
  vertex(0 + PLAY_1 + PLAY_4 * .5, 0 + PLAY_2);
  vertex(60 + PLAY_1 + PLAY_3 * .5 + PLAY_4 * .5, 0 + PLAY_2 + PLAY_3 * 2);
  vertex(60, 270 - PLAY_3 * .5);
  vertex(180, 270); vertex(180, 125);
  bezierVertex(180, 75, 120, 75, 120, 125);
  vertex(120, 175);
  vertex(60 - PLAY_4 * .5, 175 - PLAY_4 * .5);
  endShape();
  pop();
}

function letterC(xPos, yPos) {
  push(); ctx.translate(xPos, yPos); ctx.translate(0, -90);
  beginShape();
  vertex(120, 240); vertex(120, 270);
  vertex(0, 270 - PLAY_3 * .5);
  vertex(0 + PLAY_3 * .5, 175 + PLAY_1 - PLAY_3 * .25 - PLAY_4 * .25);
  vertex(60 + PLAY_4 * .25, 175);
  vertex(60, 125 - PLAY_2);
  bezierVertex(60, 75 - PLAY_2, 120, 75 - PLAY_2, 120, 125 - PLAY_2);
  vertex(120, 175 - PLAY_2);
  endShape();
  pop();
}

function letterD(xPos, yPos) {
  push(); ctx.translate(xPos, yPos); ctx.scale(-1, 1); ctx.translate(-180, -90);
  beginShape();
  vertex(0 + PLAY_1 + PLAY_4 * .5, 0 + PLAY_2);
  vertex(60 + PLAY_1 + PLAY_3 * .5 + PLAY_4 * .5, 0 + PLAY_2 + PLAY_3 * 2);
  vertex(60, 270 - PLAY_3 * .5);
  vertex(180, 270); vertex(180, 125);
  bezierVertex(180, 75, 120, 75, 120, 125);
  vertex(120, 175);
  vertex(60 - PLAY_4 * .5, 175 - PLAY_4 * .5);
  endShape();
  pop();
}

function letterE(xPos, yPos) {
  push(); ctx.translate(xPos, yPos);
  beginShape();
  vertex(0 - PLAY_4 * .5, 90 - PLAY_2 + PLAY_4 * .5);
  vertex(100, 90 - PLAY_2);
  bezierVertex(140, 90 - PLAY_2, 140, 30 - PLAY_2, 100, 30 - PLAY_2);
  vertex(60, 30 - PLAY_2);
  vertex(60 + PLAY_3 * .5, 0 - PLAY_2 - PLAY_3 * .5);
  vertex(0, 0 - PLAY_2);
  vertex(0 + PLAY_1 + PLAY_4 * .5, 180 - PLAY_3 * .5);
  vertex(120, 180); vertex(120, 150);
  endShape();
  pop();
}

function letterF(xPos, yPos) {
  push(); ctx.translate(xPos - 20, yPos);
  beginShape();
  vertex(60, 180);
  vertex(60 - PLAY_1, -75);
  bezierVertex(60 - PLAY_1, -125, 120 - PLAY_1, -125, 120 - PLAY_1, -75);
  vertex(120 - PLAY_1 - PLAY_4 * .25, -45);

function letterH(xPos, yPos) {

function letterW(xPos, yPos) {
  push(); ctx.translate(xPos - 20, yPos);

  vertex(60 + PLAY_1, 0);
  vertex(60, 145 - PLAY_2 / 1.2);

  vertex(0 + PLAY_1, 180 - PLAY_4 * .5);
  vertex(60 + PLAY_1 + PLAY_3 * .25, 180 - PLAY_3 * .5 - PLAY_4 * .5);

function letterY(xPos, yPos) {

  vertex(120 + PLAY_4 * .5, 90 - PLAY_4 * .5);

  vertex(0, 180 - PLAY_4 * .5);
  vertex(120, 180 - PLAY_3 * .5);

function drawLetter(c, xPos, yPos) {
  const fn = {
    a: letterA, b: letterB, c: letterC, d: letterD, e: letterE,
    f: letterF, g: letterG, h: letterH, i: letterI, j: letterJ,
    k: letterK, l: letterL, m: letterM, n: letterN, o: letterO,
    p: letterP, q: letterQ, r: letterR, s: letterS, t: letterT,
    u: letterU, v: letterV, w: letterW, x: letterX, y: letterY,
    z: letterZ
  }[c];
  if (fn) fn(xPos, yPos);
}

// ── Main draw loop ─────────────────────────────
function draw() {
  requestAnimationFrame(draw);

  // ── Audio reactivity ──
  if (isPlaying || micActive) {
    const amplitude = getAmplitude();
    const mA1 = amplitude / 0.05 * 40;
    const mA2 = amplitude / 0.09 * 60;
    const mA3 = amplitude / 0.09 * 60;
    const mA4 = amplitude / 0.09 * 60;

    const opt = currentControlOption;
    if (opt.includes('PLAY_1')) {
      PLAY_1 = constrain(lerp(PLAY_1, mA1, 0.02) * 0.8, 0, 60);
      document.getElementById('sl-p1').value = PLAY_1;
    }
    if (opt.includes('PLAY_2')) {
      PLAY_2 = constrain(lerp(PLAY_2, mA2, 0.05) * 0.8, 0, 60);
      document.getElementById('sl-p2').value = PLAY_2;
    }
    if (opt.includes('PLAY_3')) {
      PLAY_3 = constrain(lerp(PLAY_3, mA3, 0.05) * 0.8, 0, 60);
      document.getElementById('sl-p3').value = PLAY_3;
    }
    if (opt.includes('PLAY_4')) {
      PLAY_4 = constrain(lerp(PLAY_4, mA4, 0.05) * 0.8, 0, 60);
      document.getElementById('sl-p4').value = PLAY_4;
    }
  }

  // ── Background ──
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── Stroke style (Type color for main strokes) ──
  ctx.strokeStyle = typeColor;
  ctx.lineWidth   = strokeW;
  ctx.lineCap     = 'square';
  ctx.lineJoin    = 'round';

  // ── Transform for letters (top-left positioning) ──
  const startX = controlPanelWidth + 88;
  const startY = 250;
  const scale = unitSize;

  ctx.save();
  ctx.translate(startX, startY);
  ctx.scale(scale, scale);

  let y = 0;
  let currentX = 0;

  for (let i = 0; i < letters.length; i++) {
    if (letters[i] === '\n') {
      y += letterHeight + leading;
      currentX = 0;
    } else {
      drawLetter(letters[i], currentX, y);
      currentX = updateXPosition(currentX, letters[i]);
    }
  }

  if (strokeColor !== typeColor && letters.length > 0) {
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = strokeWeight;
    y = 0;
    currentX = 0;
    for (let i = 0; i < letters.length; i++) {
      if (letters[i] === '\n') {
        y += letterHeight + leading;
        currentX = 0;
      } else {
        drawLetter(letters[i], currentX, y);
        currentX = updateXPosition(currentX, letters[i]);
      }
    }
    ctx.lineWidth = strokeW;
  }

  ctx.restore();
}

// ── Start ──────────────────────────────────────
draw();
</script>
